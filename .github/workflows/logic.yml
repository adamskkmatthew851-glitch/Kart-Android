name: Build Logic Commons

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'android/build-logic-commons/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'android/build-logic-commons/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: 'android/build.gradle*'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build build-logic-commons
        working-directory: ./android
        run: ./gradlew :build-logic-commons:build --no-daemon
